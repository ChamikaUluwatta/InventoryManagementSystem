server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 3000
      maximum-pool-size: 5
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  inventory:
    service-url: ${IMS_URL}