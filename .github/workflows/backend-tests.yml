name: Backend Tests

on:
  pull_request:
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: Backend/go.sum

      - name: Run tests
        working-directory: Backend
        run: go test ./internal/...
